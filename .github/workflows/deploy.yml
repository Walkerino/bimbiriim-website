name: Deploy To Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  SERVER_HOST: 212.80.7.115
  SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
  SERVER_DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        run: |
          set -euo pipefail
          for key in SERVER_HOST SERVER_USER SERVER_SSH_KEY SERVER_DEPLOY_PATH; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required GitHub secret/env: ${key}"
              exit 1
            fi
          done

      - name: Prepare SSH
        run: |
          set -euo pipefail
          PORT="${SERVER_PORT}"
          mkdir -p ~/.ssh
          echo "${SERVER_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${PORT}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Ensure remote directory exists
        run: |
          set -euo pipefail
          PORT="${SERVER_PORT}"
          ssh -p "${PORT}" "${SERVER_USER}@${SERVER_HOST}" "mkdir -p '${SERVER_DEPLOY_PATH}'"

      - name: Sync files to server
        run: |
          set -euo pipefail
          PORT="${SERVER_PORT}"
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude "dist/" \
            --exclude "data/" \
            -e "ssh -p ${PORT}" \
            ./ "${SERVER_USER}@${SERVER_HOST}:${SERVER_DEPLOY_PATH}/"

      - name: Deploy on server with Docker Compose
        run: |
          set -euo pipefail
          PORT="${SERVER_PORT}"
          ssh -p "${PORT}" "${SERVER_USER}@${SERVER_HOST}" <<EOF
            set -euo pipefail
            cd "${SERVER_DEPLOY_PATH}"
            docker compose up -d --build --remove-orphans
            docker image prune -f
          EOF
