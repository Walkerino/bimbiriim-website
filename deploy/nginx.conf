server {
  listen 80;
  server_name bimbiriim.ru www.bimbiriim.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name bimbiriim.ru www.bimbiriim.ru;

  ssl_certificate /etc/letsencrypt/live/bimbiriim.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/bimbiriim.ru/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

  location /api/ {
    client_max_body_size 35m;
    proxy_pass http://api:8787;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location ~* ^/assets/.*\.(?:js|mjs|css)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location ~* \.(?:png|jpe?g|gif|webp|svg|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
  }

  location / {
    try_files $uri /index.html;
  }
}
